{% extends "base.html" %}
{% block title %}Forgot Password{% endblock %}
{% block body %}

<section class="auth-wrapper">

<div class="auth-card reveal">

<h1>Forgot Password</h1>

<p>
Enter your registered email to receive OTP.
</p>

<form method="POST">

{% csrf_token %}

<input
type="email"
name="email"
placeholder="Enter your email"
required
>

<button type="submit">
Send OTP
</button>

</form>

</div>

</section>

<style>

.auth-wrapper{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
background:#f8f8f8;
}

.auth-card{
width:100%;
max-width:420px;
background:white;
padding:42px 34px;
border-radius:26px;
box-shadow:0 20px 60px rgba(0,0,0,.08);
text-align:center;
animation:fadeUp .4s ease;
}

.auth-card h1{
font-size:42px;
margin-bottom:14px;
font-weight:700;
}

.auth-card p{
font-size:14px;
color:#666;
line-height:1.6;
margin-bottom:26px;
}

.auth-card input{
width:100%;
height:56px;
padding:0 18px;
border-radius:14px;
border:1px solid #ddd;
outline:none;
font-size:15px;
margin-bottom:18px;
transition:.25s ease;
}

.auth-card input:focus{
border-color:#000;
}

.auth-card button{
width:100%;
height:56px;
border:none;
border-radius:999px;
background:#000;
color:#fff;
font-size:15px;
font-weight:600;
transition:.25s ease;
}

.auth-card button:hover{
transform:translateY(-2px);
}

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

@media(max-width:768px){

.auth-card{
padding:32px 22px;
border-radius:22px;
}

.auth-card h1{
font-size:30px;
}

}

</style>

{% endblock %}
