{% extends "base.html" %}
{% block title %}Verify OTP{% endblock %}

{% block body %}
<section class="auth-shell">

    <div class="auth-panel reveal">

        <div class="auth-top">
            <div class="auth-badge">FRIDAY ORIGINALS</div>
            <h1>Verify OTP</h1>
            <p>
                Enter the 6-digit verification code sent to your email.
            </p>
        </div>

        <form method="POST" class="auth-form">
            {% csrf_token %}

            <input
                type="text"
                name="otp"
                maxlength="6"
                placeholder="● ● ● ● ● ●"
                required
                autocomplete="one-time-code"
            >

            <button type="submit">
                Verify Code
            </button>
        </form>

    </div>

</section>

<style>
.auth-shell{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
    background:
    radial-gradient(circle at top right,#111 0%,#000 40%,#f8f8f8 40%);
}

.auth-panel{
    width:100%;
    max-width:520px;
    background:rgba(255,255,255,.95);
    backdrop-filter:blur(14px);
    border-radius:30px;
    padding:48px;
    box-shadow:0 25px 80px rgba(0,0,0,.14);
    animation:slideUp .45s ease;
}

.auth-badge{
    display:inline-block;
    font-size:11px;
    letter-spacing:3px;
    font-weight:600;
    margin-bottom:18px;
    color:#555;
}

.auth-top h1{
    font-size:44px;
    font-weight:700;
    margin-bottom:10px;
    color:#111;
}

.auth-top p{
    font-size:15px;
    color:#666;
    line-height:1.7;
    margin-bottom:28px;
}

.auth-form input{
    width:100%;
    height:62px;
    border:none;
    border-radius:18px;
    background:#f4f4f4;
    padding:0 24px;
    font-size:22px;
    letter-spacing:10px;
    text-align:center;
    outline:none;
    transition:.25s ease;
}

.auth-form input:focus{
    background:#ededed;
    transform:scale(1.01);
}

.auth-form button{
    width:100%;
    height:60px;
    margin-top:20px;
    border:none;
    border-radius:999px;
    background:#111;
    color:#fff;
    font-size:15px;
    font-weight:600;
    transition:.3s ease;
}

.auth-form button:hover{
    transform:translateY(-2px);
}

@keyframes slideUp{
    from{
        opacity:0;
        transform:translateY(35px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@media (max-width:992px){
    .auth-panel{
        max-width:460px;
        padding:38px;
    }

    .auth-top h1{
        font-size:36px;
    }
}

@media (max-width:768px){
    .auth-shell{
        padding:16px;
        background:#f8f8f8;
    }

    .auth-panel{
        padding:28px 22px;
        border-radius:24px;
    }

    .auth-top h1{
        font-size:28px;
    }

    .auth-top p{
        font-size:14px;
    }

    .auth-form input{
        height:56px;
        font-size:18px;
        letter-spacing:6px;
    }

    .auth-form button{
        height:54px;
    }
}
</style>
{% endblock %}
