{% extends "base.html" %}
{% block title %}Reset Password{% endblock %}

{% block body %}
<section class="auth-shell">

    <div class="auth-panel reveal">

        <div class="auth-top">
            <div class="auth-badge">FRIDAY ORIGINALS</div>
            <h1>Reset Password</h1>
            <p>
                Create a secure new password for your account.
            </p>
        </div>

        <form method="POST" class="auth-form">
            {% csrf_token %}

            <input
                type="password"
                name="password"
                placeholder="New Password"
                required
                autocomplete="new-password"
            >

            <input
                type="password"
                name="confirm_password"
                placeholder="Confirm Password"
                required
                autocomplete="new-password"
            >

            <button type="submit">
                Update Password
            </button>
        </form>

    </div>

</section>

<style>
.auth-shell{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
    background:
    radial-gradient(circle at top right,#111 0%,#000 40%,#f8f8f8 40%);
}

.auth-panel{
    width:100%;
    max-width:520px;
    background:rgba(255,255,255,.95);
    backdrop-filter:blur(14px);
    border-radius:30px;
    padding:48px;
    box-shadow:0 25px 80px rgba(0,0,0,.14);
    animation:slideUp .45s ease;
}

.auth-badge{
    display:inline-block;
    font-size:11px;
    letter-spacing:3px;
    font-weight:600;
    margin-bottom:18px;
    color:#555;
}

.auth-top h1{
    font-size:44px;
    font-weight:700;
    margin-bottom:10px;
    color:#111;
}

.auth-top p{
    font-size:15px;
    color:#666;
    line-height:1.7;
    margin-bottom:28px;
}

.auth-form{
    display:flex;
    flex-direction:column;
    gap:18px;
}

.auth-form input{
    width:100%;
    height:62px;
    border:none;
    border-radius:18px;
    background:#f4f4f4;
    padding:0 24px;
    font-size:16px;
    font-weight:500;
    outline:none;
    transition:.25s ease;
}

.auth-form input:focus{
    background:#ededed;
    transform:scale(1.01);
    box-shadow:0 8px 24px rgba(0,0,0,.06);
}

.auth-form input::placeholder{
    color:#888;
}

.auth-form button{
    width:100%;
    height:60px;
    margin-top:8px;
    border:none;
    border-radius:999px;
    background:#111;
    color:#fff;
    font-size:15px;
    font-weight:600;
    letter-spacing:.5px;
    transition:.3s ease;
    cursor:pointer;
}

.auth-form button:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 25px rgba(0,0,0,.15);
}

@keyframes slideUp{
    from{
        opacity:0;
        transform:translateY(35px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@media (max-width:992px){
    .auth-panel{
        max-width:460px;
        padding:38px;
    }

    .auth-top h1{
        font-size:36px;
    }
}

@media (max-width:768px){
    .auth-shell{
        padding:16px;
        background:#f8f8f8;
    }

    .auth-panel{
        padding:28px 22px;
        border-radius:24px;
    }

    .auth-top h1{
        font-size:28px;
    }

    .auth-top p{
        font-size:14px;
    }

    .auth-form{
        gap:14px;
    }

    .auth-form input{
        height:56px;
        font-size:15px;
        padding:0 18px;
    }

    .auth-form button{
        height:54px;
        font-size:14px;
    }
}

@media (max-width:480px){
    .auth-panel{
        padding:24px 18px;
    }

    .auth-top h1{
        font-size:24px;
    }

    .auth-badge{
        font-size:10px;
        letter-spacing:2px;
    }
}
</style>
{% endblock %}
